const express = require('express');
const router = express.Router();
const { pool } = require('../db');

// GET all financial config
router.get('/', async (req, res) => {
  try {
    const result = await pool.query('SELECT key, value FROM financial_config');
    const config = {};
    result.rows.forEach(row => {
      config[row.key] = row.value;
    });
    res.json(config);
  } catch (err) {
    res.status(500).json({ error: 'Error al obtener configuración financiera' });
  }
});

// PUT update financial config
router.put('/', async (req, res) => {
  const client = await pool.connect();
  try {
    await client.query('BEGIN');
    const entries = Object.entries(req.body);
    for (const [key, value] of entries) {
      await client.query(
        `INSERT INTO financial_config (key, value) VALUES ($1, $2)
         ON CONFLICT (key) DO UPDATE SET value = $2, updated_at = NOW()`,
        [key, JSON.stringify(value)]
      );
    }
    await client.query('COMMIT');
    res.json({ message: 'Configuración financiera actualizada' });
  } catch (err) {
    await client.query('ROLLBACK');
    console.error(err);
    res.status(500).json({ error: 'Error al guardar configuración financiera' });
  } finally {
    client.release();
  }
});

module.exports = router;
