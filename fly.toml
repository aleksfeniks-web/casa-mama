# fly.toml — Configuración de Fly.io para casa-mama-api
# Generado manualmente; ajusta "app" con el nombre que elegiste en `fly launch`

app = "casa-mama-api"
primary_region = "lax"   # Los Angeles — el más cercano a Rosarito/Tijuana

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "3001"

[http_service]
  internal_port       = 3001
  force_https         = true
  auto_stop_machines  = true   # ahorra recursos en el plan gratuito
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
